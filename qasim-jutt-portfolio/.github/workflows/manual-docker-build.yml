name: Manual Docker Build & Push

# This workflow allows manual triggering to build and push Docker images
# Useful for rebuilding without code changes

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (default: github.sha)'
        required: false
        default: ''
      push-to-docker-hub:
        description: 'Push to Docker Hub?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        if: github.event.inputs.push-to-docker-hub == 'true'
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Determine tag
        id: tag
        run: |
          if [ -z "${{ github.event.inputs.tag }}" ]; then
            TAG=${{ github.sha }}
          else
            TAG=${{ github.event.inputs.tag }}
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ github.event.inputs.push-to-docker-hub == 'true' && format('docker.io/{0}/qasim-portfolio', secrets.DOCKER_USERNAME) || '' }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image pushed successfully
        run: |
          echo "✅ Docker image built and pushed successfully!"
          echo "Image tag: ${{ steps.tag.outputs.tag }}"
          echo "GitHub Registry: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}"
          if [ "${{ github.event.inputs.push-to-docker-hub }}" == "true" ]; then
            echo "Docker Hub: docker.io/${{ secrets.DOCKER_USERNAME }}/qasim-portfolio:${{ steps.tag.outputs.tag }}"
          fi
