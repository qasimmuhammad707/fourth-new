version: '3.8'

services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    volumes:
      - ./public:/app/public
    restart: unless-stopped
    container_name: qasim-portfolio

networks:
  default:
    name: portfolio-network
